<!DOCTYPE html>
<html>
<head>
<title>Searchable Route Map</title>

<style>
#map{
height:500px;
width:100%;
}

body{
font-family:Arial;
}

.controls{
margin-bottom:10px;
}

input{
width:300px;
padding:8px;
}
</style>

</head>
<body>

<h2>Route Tracker</h2>

<div class="controls">

<label>Search Destination:</label>

<input id="destination" type="text" placeholder="Search location...">

<button id="routeBtn" onclick="calculateRoute()" disabled>
Get Route
</button>

</div>

<div id="map"></div>

<script>

let map;
let directionsService;
let directionsRenderer;
let autocomplete;
let currentLocation;
let destinationPlace;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:12,
center:{lat:7.1907,lng:125.4553}
});

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer();
directionsRenderer.setMap(map);

const input=document.getElementById("destination");

autocomplete=new google.maps.places.Autocomplete(input);

autocomplete.addListener("place_changed",function(){

destinationPlace=autocomplete.getPlace();

if(!destinationPlace.geometry){
alert("Please select a valid location");
return;
}

});

getCurrentLocation();

}

function getCurrentLocation(){

if(!navigator.geolocation){
alert("Geolocation not supported.");
return;
}

navigator.geolocation.getCurrentPosition(

function(position){

currentLocation={
lat:position.coords.latitude,
lng:position.coords.longitude
};

map.setCenter(currentLocation);

new google.maps.Marker({
position:currentLocation,
map:map,
title:"Your Location"
});

document.getElementById("routeBtn").disabled=false;

},

function(){
alert("Location permission denied.");
}

);

}

function calculateRoute(){

if(!destinationPlace){
alert("Please search and select a destination.");
return;
}

const request={
origin:currentLocation,
destination:destinationPlace.geometry.location,
travelMode:google.maps.TravelMode.DRIVING
};

directionsService.route(request,function(result,status){

if(status==="OK"){
directionsRenderer.setDirections(result);
}
else{
alert("Route failed: "+status);
}

});

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap">
</script>

</body>
</html>
